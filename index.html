<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Беларуси с метками</title>
    
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Подключаем Яндекс Карты -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=1273efde-914a-4340-9283-f10169192a6a&lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <!-- Контейнер для карты -->
    <div id="map"></div>
    
    <!-- Панель с кнопками внизу -->
    <div class="controls">
        <div class="control-item">
            <button class="marker-btn home" data-type="home">
                <img src="icons/home.png" alt="Дом" class="btn-icon">
            </button>
            <span class="btn-label">Ямы</span>
        </div>
        
        <div class="control-item">
            <button class="marker-btn car" data-type="car">
                <img src="icons/car.png" alt="Машина" class="btn-icon">
            </button>
            <span class="btn-label">Пробка</span>
        </div>
        
        <div class="control-item">
            <button class="marker-btn tree" data-type="tree">
                <img src="icons/tree.png" alt="Парк" class="btn-icon">
            </button>
            <span class="btn-label">Дрон</span>
        </div>
        
        <div class="control-item">
            <button class="marker-btn shop" data-type="shop">
                <img src="icons/shop.png" alt="Магазин" class="btn-icon">
            </button>
            <span class="btn-label">Камера</span>
        </div>
        
        <div class="control-item">
            <button class="marker-btn star" data-type="star">
                <img src="icons/star.png" alt="Избранное" class="btn-icon">
            </button>
            <span class="btn-label">Пост</span>
        </div>
    </div>

    <!-- Сообщение о таймере -->
    <div id="message" class="message"></div>
